# docker-compose.prod.yml
# Production configuration with correct port mappings
# See: /home/tk/lms-prod/KENYA_BANK_ACCOUNT_DETAILS.md

services:
  db:
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - '5432'
    ports: []  # Internal only - not exposed to host
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    expose:
      - '6379'
    ports: []  # Internal only - not exposed to host
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECURE_SSL_REDIRECT=True
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
      - SOCKETIO_ENABLED=True
      - SOCKETIO_REDIS_URL=redis://redis:6379/1
    ports:
      - "7001:8000"  # Backend API port
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery:
    volumes:
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  celery-beat:
    environment:
      - DEBUG=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  flower:
    ports:
      - "7003:5555"  # Flower monitoring port

  sentry:
    ports:
      - "9000:9000"  # Sentry error tracking port

  nginx:
    ports:
      - "7004:80"    # Secondary Nginx
      - "7005:443"   # Secondary Nginx HTTPS
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "7000:80"    # Main frontend port
    restart: unless-stopped

  socketio:
    ports:
      - "7002:8001"  # SocketIO WebSocket port

volumes:
  postgres_data:
    external: true
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
