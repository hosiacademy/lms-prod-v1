services:
  # PostgreSQL Database
  db:
    image: postgres:13-alpine
    container_name: lms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_DB=${DB_NAME:-hosiacademylms}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (for caching and Celery)
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Django Backend with Uvicorn (ASGI for WebSocket support)
  backend:
    image: lms-prod-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name removed to allow scaling in production
    ports:
      - "7001:8000"
    volumes:
      - ./backend:/app
      - ./frontend/build/web:/app/frontend/build/web:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SOCKETIO_ENABLED=True
      - SOCKETIO_REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             mkdir -p /app/static/assets/flutter_web &&
             cp -r /app/frontend/build/web/* /app/static/assets/flutter_web/ 2>/dev/null || echo 'Flutter build not found, skipping' &&
             uvicorn lms_project.asgi:application --host 0.0.0.0 --port 8000 --workers 4"
    restart: unless-stopped

  # Celery Worker
  celery:
    image: lms-prod-celery
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: lms_celery  <-- Removed for scaling
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
      - backend
    command: celery -A lms_project worker --loglevel=info --concurrency=2 --max-tasks-per-child=100
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  # Celery Worker 2 (scaled)
  celery-2:
    image: lms-prod-celery
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
      - backend
    command: celery -A lms_project worker --loglevel=info --concurrency=2 --max-tasks-per-child=100
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    image: lms-prod-celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_celery_beat
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
      - backend
    command: celery -A lms_project beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # Celery Flower (Task Monitor)
  flower:
    image: lms-prod-flower
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_flower
    ports:
      - "7003:5555"
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      - redis
      - celery
    command: celery -A lms_project flower --port=5555
    restart: unless-stopped

  # Sentry (Error Tracking)
  sentry:
    image: sentry:latest
    container_name: lms_sentry
    ports:
      - "9000:9000"
    environment:
      - SENTRY_SECRET_KEY=${SENTRY_SECRET_KEY:-changeme}
      - SENTRY_POSTGRES_HOST=db
      - SENTRY_DB_USER=${DB_USER:-postgres}
      - SENTRY_DB_PASSWORD=${DB_PASSWORD:-changeme}
      - SENTRY_REDIS_HOST=redis
    depends_on:
      - redis
      - db
    restart: unless-stopped

  # Socket.IO Real-time server
  socketio:
    image: lms-prod-socketio
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_socketio
    ports:
      - "7002:8001"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SOCKETIO_ENABLED=True
      - SOCKETIO_REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
      - db
    command: python socketio_server.py
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lms_nginx
    ports:
      - "7004:80"
      - "7005:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Flutter Frontend (optional - for web version)
  frontend:
    image: nginx:alpine
    container_name: lms-prod-frontend-1
    ports:
      - "7000:80"
    volumes:
      - ./frontend/prebuilt_web:/usr/share/nginx/html:ro
    networks:
      - lms_network
    restart: unless-stopped

volumes:
  postgres_data:
    name: lms-monorepo_postgres_data
    external: true
  redis_data:
  static_volume:
  media_volume:
