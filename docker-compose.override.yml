# docker-compose.override.yml
# This file is automatically used by docker-compose for local development
# It overrides settings in docker-compose.yml for a better development experience

version: '3.8'

services:
  backend:
    # Use Uvicorn ASGI server for WebSocket support
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             uvicorn lms_project.asgi:application --host 0.0.0.0 --port 8000 --reload"
    # Expose backend directly for easier debugging
    ports:
      - "7001:8000"
    environment:
      - DEBUG=True
      - PYTHONDONTWRITEBYTECODE=1
      - SOCKETIO_ENABLED=True
      - SOCKETIO_REDIS_URL=redis://redis:6379/1
    # Enable hot-reload by mounting code as volume
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery:
    # More verbose logging in development
    command: celery -A lms_project worker --loglevel=debug
    environment:
      - DEBUG=True

  celery-beat:
    # More verbose logging in development
    command: celery -A lms_project beat --loglevel=debug
    environment:
      - DEBUG=True

  # Disable Nginx in development (access backend directly)
  nginx:
    profiles:
      - production  # Only run when explicitly specifying 'production' profile

volumes:
  static_volume:
  media_volume:
