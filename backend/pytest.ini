[pytest]
# Pytest configuration for LMS Backend

DJANGO_SETTINGS_MODULE = lms_project.settings_test
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests apps

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=apps
    --cov=core
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=70
    --maxfail=5
    --reuse-db
    -n auto

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use database)
    slow: Slow running tests
    payment: Payment-related tests
    api: API endpoint tests
    security: Security-related tests
    celery: Celery task tests
    smoke: Smoke tests for quick validation

# Coverage options
[coverage:run]
source = apps,core
omit =
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
