<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hosi Academy - Learn anytime, anywhere">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hosi Academy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hosi Academy</title>
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0D1B2A">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* hosiMidnight background simulating the onboarding dark bg */
    body {
      background: #0D1B2A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Afrocentric Kente-inspired diagonal stripe background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          -55deg,
          transparent,
          transparent 24px,
          rgba(245,166,35,0.06) 24px,
          rgba(245,166,35,0.06) 28px,
          transparent 28px,
          transparent 44px,
          rgba(140,73,40,0.07) 44px,
          rgba(140,73,40,0.07) 48px,
          transparent 48px,
          transparent 60px,
          rgba(245,166,35,0.03) 60px,
          rgba(245,166,35,0.03) 62px
        );
      pointer-events: none;
    }

    /* Modal overlay */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: rgba(5, 12, 20, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
      backdrop-filter: blur(6px);
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Modal card — dark surface matching hosiMidnight */
    .splash-modal {
      background: linear-gradient(160deg, #132030 0%, #0D1B2A 100%);
      border: 1px solid rgba(245, 166, 35, 0.18);
      border-radius: 28px;
      padding: 48px 44px 44px;
      width: 440px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow:
        0 0 0 1px rgba(245,166,35,0.08),
        0 40px 80px rgba(0,0,0,0.55),
        0 0 60px rgba(140,73,40,0.12);
      animation: modal-in 0.48s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes modal-in {
      from { transform: scale(0.86) translateY(12px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    /* Logo circle */
    .logo-wrap {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(245,166,35,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      animation: logo-pulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 28px rgba(245,166,35,0.12);
    }

    @keyframes logo-pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 28px rgba(245,166,35,0.12); }
      50%       { transform: scale(1.05); box-shadow: 0 0 44px rgba(245,166,35,0.22); }
    }

    .logo-wrap img {
      width: 74px;
      height: 74px;
      object-fit: contain;
    }

    /* Text */
    .splash-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(245,166,35,0.65);
      margin-bottom: 10px;
    }

    .splash-title {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      text-shadow: 0 0 32px rgba(245,166,35,0.18);
    }

    .splash-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-bottom: 44px;
      letter-spacing: 0.2px;
    }

    /* Animated progress bar — hosiPeach → hosiBrown */
    .progress-track {
      width: 164px;
      height: 3px;
      background: rgba(245,166,35,0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #F5A623, #8C4928);
      border-radius: 99px;
      width: 0%;
      animation: progress-run 2.6s ease-in-out infinite;
    }

    @keyframes progress-run {
      0%   { width: 0%;   opacity: 1; }
      65%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown immediately while Flutter engine initializes -->
  <div id="loading-screen">
    <div class="splash-modal">
      <div class="logo-wrap">
        <img src="assets/assets/images/logo.png" alt="Hosi Academy" onerror="this.src='icons/Icon-192.png'" />
      </div>
      <div class="splash-label">Welcome to</div>
      <div class="splash-title">Hosi Academy</div>
      <div class="splash-subtitle">The Future of Learning</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide loading screen once Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function() {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('fade-out');
        setTimeout(function() {
          if (screen.parentNode) {
            screen.parentNode.removeChild(screen);
          }
        }, 650);
      }
    });

    // Fallback: hide after 12 seconds if flutter-first-frame never fires
    setTimeout(function() {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('fade-out');
        setTimeout(function() {
          if (screen && screen.parentNode) {
            screen.parentNode.removeChild(screen);
          }
        }, 650);
      }
    }, 12000);
  </script>
</body>
</html>
