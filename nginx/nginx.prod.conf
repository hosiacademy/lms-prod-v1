# Nginx configuration for LMS Production (HTTPS on 443)

# Upstream definitions
upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=socket:10m rate=20r/s;

# Cache for static files
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

# ==================== HTTP SERVER (PORT 80) ====================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Favicon - return empty 204 to prevent 502/404 errors
    location ~* ^/favicon\.(ico|png)$ {
        return 204;
        add_header Content-Type image/x-icon;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS SERVER (PORT 443) ====================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Favicon - return empty 204 to prevent 502/404 errors
    location ~* ^/favicon\.(ico|png)$ {
        return 204;
        add_header Content-Type image/x-icon;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==================== FRONTEND ====================
    location / {
        limit_req zone=general burst=10 nodelay;
        
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== SOCKET.IO (WebSocket Support) ====================
    location /socket.io/ {
        limit_req zone=socket burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ==================== BACKEND API ====================
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Static Files
    location /static/ {
        proxy_pass http://backend_upstream;
        proxy_cache static_cache;
        expires 1y;
    }

    # Media Files
    location /media/ {
        proxy_pass http://backend_upstream;
        proxy_cache static_cache;
        expires 1M;
    }

    # Health check
    location /health/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        access_log off;
    }
}
