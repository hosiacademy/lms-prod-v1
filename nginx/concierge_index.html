<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Hosi Academy AI Concierge</title>

      * {

        padding: 0;
        box-sizing: border-box;
      }

        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #concierge-container {
        width: 100%;
        height: 100%;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="concierge-container">
      <iframe 
        id="concierge-frame"
        src="https://hosi-academy-concierge-510764236399.us-west1.run.app/"
        allow="microphone *; camera *"
        allowfullscreen
      ></iframe>
    </div>
    <script>
      // Handle iOS safe area and communication
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'concierge-expand') {
          // Expanded
        } else if (event.data && event.data.type === 'concierge-collapse') {
          // Collapsed
        }
      });
    </script>
  </body>
</html>
