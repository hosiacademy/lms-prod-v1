server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
    gzip_min_length 1024;

    # Favicon - serve PNG for both .ico and .png requests
    location = /favicon.ico {
        try_files /favicon.png =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /favicon.png {
        try_files /favicon.png =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Flutter bootstrap files — NEVER cache; must always be fresh after deploy
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|flutter\.js|version\.json|manifest\.json|main\.dart\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # Static assets (fonts, images) — cache 1 week, but revalidate
    location ~* \.(ttf|otf|woff|woff2|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    # WASM files — safe to cache long term (filename changes with Flutter version)
    location ~* \.wasm$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    # SPA fallback — all unmatched routes serve index.html (no cache)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # API Proxy - Force HTTPS and handle CORS
    location /api/ {
        # Add CORS headers for multiple origins
        set $cors_origin "";
        if ($http_origin ~* "^https://www\.hosiacademy\.africa$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://localhost(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://127\.0\.0\.1(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://154\.66\.211\.3(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        if ($cors_origin != "") {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials true always;
        }
        
        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin https://www.hosiacademy.africa always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }
        
        # Proxy to backend
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Socket.IO (WebSocket Support)
    location /socket.io/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # WebSocket generic
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
