<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hosi Academy - Learn anytime, anywhere">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hosi Academy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hosi Academy</title>
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0D1B2A">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1B2A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0D1B2A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: min(280px, 70vw);
      height: auto;
      animation: logo-pulse 2s ease-in-out infinite;
    }

    @keyframes logo-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }

    .splash-tagline {
      margin-top: 24px;
      color: rgba(245, 166, 35, 0.7);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .splash-loader {
      margin-top: 32px;
      width: 120px;
      height: 3px;
      background: rgba(245, 166, 35, 0.15);
      border-radius: 99px;
      overflow: hidden;
    }

    .splash-loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #F5A623, #8C4928);
      border-radius: 99px;
      animation: loader-slide 1.4s ease-in-out infinite;
    }

    @keyframes loader-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div style="text-align: center;">
      <h1 style="color: #F5A623; font-size: 48px; margin-bottom: 16px;">Hosi Academy</h1>
      <div class="splash-tagline">The Future of Learning</div>
      <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('fade-out');
        setTimeout(function() {
          if (screen.parentNode) {
            screen.parentNode.removeChild(screen);
          }
        }, 650);
      }
    });

    setTimeout(function() {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('fade-out');
        setTimeout(function() {
          if (screen && screen.parentNode) {
            screen.parentNode.removeChild(screen);
          }
        }, 650);
      }
    }, 15000);
  </script>
</body>
</html>
