  <path d="M100 85 L100 92" stroke="#1E88E5" stroke-width="2" stroke-dasharray="4 2" opacity="0.5"/>
  <path d="M150 85 L150 92" stroke="#1E88E5" stroke-width="2" stroke-dasharray="4 2" opacity="0.5"/>
  
  <!-- Label -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E88E5">Industry Specific</text>
