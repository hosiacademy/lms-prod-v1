<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#1E88E5" fill-opacity="0.12"/>
  <circle cx="100" cy="100" r="85" stroke="#1E88E5" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Industry/Gear Icon -->
  <g transform="translate(60, 45)">
    <!-- Main Gear -->
    <path d="M40 15 L43.5 8 L50 11 L56.5 8 L60 15 L67 15 L70 21.5 L77 23 L77 30 L70 31.5 L67 38 L60 38 L56.5 45 L50 42 L43.5 45 L40 38 L33 38 L30 31.5 L23 30 L23 23 L30 21.5 L33 15 Z" 
          fill="#1E88E5" opacity="0.9"/>
    <circle cx="50" cy="26.5" r="12" fill="white"/>
    <circle cx="50" cy="26.5" r="6" fill="#1E88E5"/>
  </g>
  
  <!-- Role-based Icons -->
  <g transform="translate(35, 95)">
    <!-- Healthcare -->
    <rect x="0" y="0" width="35" height="40" rx="6" fill="#E3F2FD"/>
    <path d="M12 10 L23 10" stroke="#1E88E5" stroke-width="3" stroke-linecap="round"/>
    <path d="M17.5 5 L17.5 15" stroke="#1E88E5" stroke-width="3" stroke-linecap="round"/>
    <text x="17.5" y="32" text-anchor="middle" font-size="8" font-weight="bold" fill="#1E88E5">Health</text>
  </g>
  
  <g transform="translate(82.5, 95)">
    <!-- Tech/IT -->
    <rect x="0" y="0" width="35" height="40" rx="6" fill="#E3F2FD"/>
    <rect x="8" y="8" width="19" height="14" rx="2" fill="#1E88E5"/>
    <rect x="10" y="10" width="3" height="3" fill="#90CAF9"/>
    <rect x="15" y="10" width="3" height="3" fill="#90CAF9"/>
    <rect x="20" y="10" width="3" height="3" fill="#90CAF9"/>
    <text x="17.5" y="32" text-anchor="middle" font-size="8" font-weight="bold" fill="#1E88E5">Tech</text>
  </g>
  
  <g transform="translate(130, 95)">
    <!-- Finance -->
    <rect x="0" y="0" width="35" height="40" rx="6" fill="#E3F2FD"/>
    <text x="17.5" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E88E5">$</text>
    <path d="M8 28 L27 28" stroke="#1E88E5" stroke-width="2" stroke-linecap="round"/>
    <text x="17.5" y="32" text-anchor="middle" font-size="8" font-weight="bold" fill="#1E88E5">Finance</text>
  </g>
  
  <!-- Connecting Lines -->
