<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#F79150" fill-opacity="0.1"/>
  <circle cx="100" cy="100" r="85" stroke="#F79150" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(55, 50)">
    <!-- Cap Top -->
    <path d="M10 35 L50 15 L90 35 L50 55 Z" fill="#F79150" opacity="0.9"/>
    <path d="M10 35 L50 55 L90 35" stroke="#8C4928" stroke-width="2" fill="none"/>
    
    <!-- Cap Base -->
    <ellipse cx="50" cy="60" rx="40" ry="12" fill="#8C4928" opacity="0.8"/>
    
    <!-- Tassel -->
    <circle cx="85" cy="30" r="6" fill="#FFD700"/>
    <path d="M85 36 Q88 45 85 50" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <circle cx="85" cy="52" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Certificate/Diploma -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="#FFF3E0"/>
    <rect x="0" y="0" width="80" height="12" rx="4" fill="#F79150"/>
    
    <!-- Seal -->
    <circle cx="40" cy="35" r="10" fill="#FFD700"/>
    <circle cx="40" cy="35" r="7" fill="#F79150"/>
    <text x="40" y="38" text-anchor="middle" font-size="8" font-weight="bold" fill="white">✓</text>
    
    <!-- Lines representing text -->
    <rect x="10" y="18" width="60" height="3" rx="1" fill="#8C4928" opacity="0.5"/>
    <rect x="10" y="24" width="45" height="3" rx="1" fill="#8C4928" opacity="0.5"/>
  </g>
  
  <!-- Sparkles/Stars -->
  <g transform="translate(140, 60)">
    <path d="M10 0 L12 6 L18 6 L13 10 L15 16 L10 12 L5 16 L7 10 L2 6 L8 6 Z" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g transform="translate(30, 70)">
    <path d="M5 0 L6 3 L9 3 L7 5 L8 8 L5 6 L2 8 L3 5 L1 3 L4 3 Z" fill="#FFD700" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F79150">Masterclasses</text>
</svg>
