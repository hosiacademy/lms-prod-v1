# ==================== STAGING DOCKER COMPOSE CONFIGURATION ====================
# This configuration is specifically for the staging server at 154.66.211.3
# Uses ports 7000 (backend) and 7001 (admin/alternative backend)
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# ==================== STAGING OVERRIDES ====================

version: '3.8'

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:15-alpine
    container_name: lms-staging-db
    environment:
      POSTGRES_DB: hosiacademylms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-staging-network
    restart: unless-stopped

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: lms-staging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-staging-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ==================== BACKEND (PORT 7000) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-staging-backend
    command: gunicorn --config gunicorn.conf.py lms_project.wsgi:application
    volumes:
      - ./backend:/app
      - static_volume_staging:/app/staticfiles
      - media_volume_staging:/app/media
    ports:
      - "7000:8000"  # Map external port 7000 to internal port 8000
    environment:
      - DJANGO_SETTINGS_MODULE=lms_project.settings
      - ENVIRONMENT=staging
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hosiacademylms
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,154.66.211.3,hosiacademy.com,www.hosiacademy.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lms-staging-network
    restart: unless-stopped

  # ==================== BACKEND SECONDARY (PORT 7001) ====================
  # This can be used for load balancing or as an admin-only instance
  backend-secondary:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-staging-backend-secondary
    command: gunicorn --config gunicorn.conf.py lms_project.wsgi:application
    volumes:
      - ./backend:/app
      - static_volume_staging:/app/staticfiles
      - media_volume_staging:/app/media
    ports:
      - "7001:8000"  # Map external port 7001 to internal port 8000
    environment:
      - DJANGO_SETTINGS_MODULE=lms_project.settings
      - ENVIRONMENT=staging
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hosiacademylms
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,154.66.211.3,hosiacademy.com,www.hosiacademy.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lms-staging-network
    restart: unless-stopped

  # ==================== CELERY WORKER ====================
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-staging-celery-worker
    command: celery -A lms_project worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_volume_staging:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=lms_project.settings
      - ENVIRONMENT=staging
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hosiacademylms
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-staging-network
    restart: unless-stopped

  # ==================== CELERY BEAT ====================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-staging-celery-beat
    command: celery -A lms_project beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=lms_project.settings
      - ENVIRONMENT=staging
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hosiacademylms
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-staging-network
    restart: unless-stopped

# ==================== VOLUMES ====================
volumes:
  postgres_data_staging:
    driver: local
  redis_data_staging:
    driver: local
  static_volume_staging:
    driver: local
  media_volume_staging:
    driver: local

# ==================== NETWORKS ====================
networks:
  lms-staging-network:
    driver: bridge
